# signalk-rs development config
#
# Used by both Docker (docker-compose.yml) and local dev.
# Docker: mounted as /etc/signalk-rs/config.toml, paths match container layout.
# Local:  cargo run --features simulator (override paths with env or copy/edit).

# Top-level paths (must be before any [section] headers in TOML)
modules_dir = "/var/lib/signalk-rs/node_modules"
data_dir = "/var/lib/signalk-rs"

[server]
port = 3000
host = "0.0.0.0"
name = "signalk-rs dev"

[vessel]
uuid = "urn:mrn:signalk:uuid:a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
name = "Dev Boat"

[auth]
jwt_secret = "dev-secret-not-for-production"
token_ttl_secs = 604800
admin_user = "admin"
admin_password_hash = ""

[internal]
transport = "uds"
uds_rs_socket = "/run/signalk/rs.sock"
uds_bridge_socket = "/run/signalk/bridge.sock"
bridge_token = "dev-token-12345"

# --- Source Priorities ---
# Lower number = higher priority. Default is 100.
# This lets us verify that when all three paths produce the same data,
# the highest-priority source wins.
[source_priorities]
"nmea0183-sim.GP" = 10             # NMEA 0183 path (highest)
"sensor-data-simulator" = 50       # Direct delta path (medium)
# NMEA 2000 sources (nmea2000-sim.{pgn}) get default 100 (lowest)

# --- Plugins ---

# Simulator: all three output modes active
[[plugins]]
id = "sensor-data-simulator"
config = { update_interval_ms = 1000, output = { direct = true, nmea0183 = { enabled = true, host = "127.0.0.1", port = 10110, talker_id = "GP" }, nmea2000 = { enabled = true, interface = "vcan0", source_address = 42 } } }

# Tracks: records position history for all vessels
[[plugins]]
id = "tracks"
config = { min_interval_secs = 5, max_points = 50000, max_age_hours = 24 }

# NMEA 0183 TCP receiver: listens on port 10110 for simulator sentences
[[plugins]]
id = "nmea0183-tcp"
config = { addr = "0.0.0.0:10110", source_label = "nmea0183-sim" }

# NMEA 2000 receiver: reads CAN frames from vcan0
[[plugins]]
id = "nmea2000"
config = { interface = "vcan0", source_label = "nmea2000-sim" }
