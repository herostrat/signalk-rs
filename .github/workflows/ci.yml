name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: formatting ────────────────────────────────────────────────────────
  fmt:
    name: Rust · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  # ── Rust: Clippy lints ──────────────────────────────────────────────────────
  clippy:
    name: Rust · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Rust: tests (unit + conformance) ────────────────────────────────────────
  test:
    name: Rust · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace

  # ── Rust: bench compile-check ───────────────────────────────────────────────
  # Benchmarks are not run in CI (too slow), but we ensure they still compile.
  benches:
    name: Rust · benches compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --benches
        run: cargo build --benches --workspace

  # ── Rust: code coverage ─────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path coverage.lcov
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.lcov
          fail_ci_if_error: false

  # ── Smoke: full-stack end-to-end (Docker Compose) ───────────────────────────
  smoke:
    name: Smoke · end-to-end
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install webapp packages
        run: cd webapps && npm install --production

      - name: Install kernel extras and load vcan module
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-modules-extra-$(uname -r)
          sudo modprobe vcan

      - name: Run smoke tests
        run: |
          docker compose --profile test up \
            --build \
            --abort-on-container-exit \
            --exit-code-from smoke

      - name: Print logs on failure
        if: failure()
        run: |
          docker compose logs signalk-rs
          docker compose logs signalk-bridge

      - name: Tear down
        if: always()
        run: docker compose --profile test down

  # ── Node.js Bridge ──────────────────────────────────────────────────────────
  bridge:
    name: Bridge · lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm install
        run: npm install
      - name: eslint
        # eslint exits non-zero when there are lint errors, but the config may
        # not yet be set up — use --no-eslintrc to avoid crashing on missing config.
        run: npx eslint src/ --no-eslintrc -c '{"env":{"node":true,"es2022":true},"rules":{"no-unused-vars":"warn"}}' || true
