name: Side-by-Side Conformance

# Runs when explicitly triggered or nightly on main.
# Requires Docker Compose v2 and the signalk-rs Dockerfile to exist.
on:
  workflow_dispatch:
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  compare:
    name: Compare vs. original signalk-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start both servers
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --detach \
            signalk-original signalk-rs

      - name: Wait for health checks
        run: |
          docker compose -f docker-compose.test.yml \
            run --rm conformance-runner \
            sh -c 'until curl -sf $ORIGINAL_URL/signalk && curl -sf $RS_URL/signalk; do sleep 2; done'

      - name: Run comparison
        run: |
          docker compose -f docker-compose.test.yml \
            run --rm conformance-runner

      - name: Print logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs signalk-original
          docker compose -f docker-compose.test.yml logs signalk-rs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down
