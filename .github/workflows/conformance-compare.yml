name: Side-by-Side Conformance

# Runs when explicitly triggered or nightly on main.
# Requires Docker Compose v2 and the signalk-rs Dockerfile to exist.
on:
  workflow_dispatch:
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  plugin-compat:
    name: Plugin API compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run plugin compatibility tests
        run: |
          docker compose -f tests/plugin-compat/docker-compose.yml \
            up --build --abort-on-container-exit --exit-code-from verify

      - name: Print logs on failure
        if: failure()
        run: |
          docker compose -f tests/plugin-compat/docker-compose.yml logs signalk-rs
          docker compose -f tests/plugin-compat/docker-compose.yml logs bridge

      - name: Tear down
        if: always()
        run: docker compose -f tests/plugin-compat/docker-compose.yml down

  compare:
    name: Full conformance vs. original
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run conformance comparison
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from conformance-runner \
            signalk-original signalk-rs conformance-runner

      - name: Print logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs signalk-original
          docker compose -f docker-compose.test.yml logs signalk-rs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down

  v2-verify:
    name: v2 API spec conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run v2 API verification
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from v2-verify-runner \
            signalk-rs-v2 v2-verify-runner

      - name: Print logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs signalk-rs-v2

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down
