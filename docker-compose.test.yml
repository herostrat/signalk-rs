# Side-by-side conformance comparison:
#   signalk-original  (port 3000)  <- official signalk-server (Node.js)
#   signalk-rs        (port 3001)  <- this project
#   conformance-runner              <- API structure + data injection + derived data comparison
#   signalk-rs-v2     (port 3002)  <- signalk-rs with all plugins for v2 API tests
#   v2-verify-runner                <- v2 API spec conformance (signalk-rs only)
#
# Usage:
#   # Full conformance (API + data + derived):
#   docker compose -f docker-compose.test.yml up --build \
#     --abort-on-container-exit --exit-code-from conformance-runner \
#     signalk-original signalk-rs conformance-runner
#
#   # v2 API conformance (signalk-rs only):
#   docker compose -f docker-compose.test.yml up --build \
#     --abort-on-container-exit --exit-code-from v2-verify-runner \
#     signalk-rs-v2 v2-verify-runner
#
# The runners exit 0 if all comparisons pass, non-zero on divergence.

services:
  # -- Official SignalK server (reference implementation) ----------------------
  signalk-original:
    build:
      context: ./tests/conformance
      dockerfile: Dockerfile.original
    ports:
      - "3000:3000"
    # Disable security so plugin POST endpoints are accessible without auth.
    # The startup.sh entrypoint enables security by default; we override it.
    entrypoint: ["node", "/home/node/signalk/node_modules/signalk-server/bin/signalk-server"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/signalk"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -- signalk-rs (Rust implementation) ----------------------------------------
  signalk-rs:
    build:
      context: .
      dockerfile: docker/Dockerfile.rs
      args:
        FEATURES: "simulator"
    ports:
      - "3001:3000"
    volumes:
      - ./tests/conformance/config:/etc/signalk-rs:ro
    environment:
      - SIGNALK_CONFIG_FILE=/etc/signalk-rs/signalk-rs.toml
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/signalk"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -- API conformance runner --------------------------------------------------
  conformance-runner:
    build:
      context: ./tests/conformance
      dockerfile: Dockerfile
    depends_on:
      signalk-original:
        condition: service_healthy
      signalk-rs:
        condition: service_healthy
    environment:
      - ORIGINAL_URL=http://signalk-original:3000
      - RS_URL=http://signalk-rs:3000

  # -- signalk-rs with all plugins (for v2 API tests) ---------------------------
  signalk-rs-v2:
    build:
      context: .
      dockerfile: docker/Dockerfile.rs
      args:
        FEATURES: "simulator"
    ports:
      - "3002:3000"
    volumes:
      - ./tests/conformance/config:/etc/signalk-rs:ro
    environment:
      - SIGNALK_CONFIG_FILE=/etc/signalk-rs/signalk-rs-v2.toml
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/signalk"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -- v2 API conformance runner (signalk-rs only) ------------------------------
  v2-verify-runner:
    build:
      context: ./tests/conformance
      dockerfile: Dockerfile.v2
    depends_on:
      signalk-rs-v2:
        condition: service_healthy
    environment:
      - RS_URL=http://signalk-rs-v2:3000
