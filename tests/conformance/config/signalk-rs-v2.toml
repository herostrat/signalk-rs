[server]
port = 3000
host = "0.0.0.0"
name = "signalk-rs-v2-test"

[vessel]
uuid = "urn:mrn:signalk:uuid:00000000-0000-4000-8000-000000000001"
name = "Test Vessel"
mmsi = "123456789"

[auth]
jwt_secret = "test-secret-for-v2-conformance"
token_ttl_secs = 3600
admin_user = "admin"
admin_password_hash = ""

[internal]
transport = "uds"
uds_rs_socket = "/run/signalk/rs.sock"
uds_bridge_socket = "/run/signalk/bridge.sock"

# Enable all plugins relevant for v2 API testing.
# Simulator feature is enabled at build time for /test/inject endpoint.

[[plugins]]
id = "derived-data"

[[plugins]]
id = "autopilot"

[[plugins]]
id = "anchor-alarm"

[[plugins]]
id = "tracks"

[[plugins]]
id = "ais-status"
